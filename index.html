<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Dan Bauman Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
    }

    /* TRANSPARENT HEADER                                                 */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: transparent;
      padding: 1.4rem 2rem;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
    }

    /* TEXT STACK: right-aligned so both lines end at same point         */
    .text-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;                  /* <- gap between the two lines     */
    }

    /* LOGO NAME
       font-size: make bigger/smaller here
       color: all three elements share this exact value                  */
    .name-line {
      font-family: "DM Serif Text", serif;
      font-size: 1.75rem;            /* <- "dan bauman" size             */
      font-weight: 400;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.82); /* <- logo color — change all three together */
      line-height: 1;
    }

    /* LOGO TAGLINE — same font, same color, smaller                     */
    .tagline-line {
      font-family: "DM Serif Text", serif;
      font-size: 1.1rem;             /* <- "photography" size            */
      font-weight: 400;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.82); /* <- same as name-line             */
      line-height: 1;
    }

    /* VERTICAL DIVIDER — same color as text                             */
    .vertical-line {
      width: 1px;
      height: 3.2rem;
      background: rgba(255,255,255,0.82); /* <- same as name/tagline     */
    }

    /* HAMBURGER                                                          */
    .hamburger-menu {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 0.5rem;
    }

    .hamburger-menu span {
      display: block;
      width: 34px;                   /* <- line width                    */
      height: 2px;
      background: rgba(255,255,255,0.82); /* <- same color as logo       */
      transition: transform 0.3s, opacity 0.3s;
    }

    .hamburger-menu.active span:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);
    }
    .hamburger-menu.active span:nth-child(2) { opacity: 0; }
    .hamburger-menu.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    /* SLIDE-OUT NAV                                                      */
    .main-nav {
      position: fixed;
      top: 0;
      right: -320px;
      width: 280px;
      height: 100vh;
      background: rgba(10,10,10,0.97);
      z-index: 99;
      transition: right 0.35s ease;
      padding-top: 6rem;
      padding-left: 2rem;
    }

    .main-nav.active { right: 0; }

    .main-nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .main-nav a {
      font-family: "DM Serif Text", serif;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      transition: color 0.2s;
    }

    .main-nav a:hover,
    .main-nav a.active { color: rgba(255,255,255,0.95); }

    .menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 98;
    }

    .menu-overlay.active { display: block; }

    /* BACKGROUND IMAGE                                                   */
    .contact-page {
      flex: 1;
      background-image:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.78)),
        url('2017.jpg');                  /* <- background image filename */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding: 8rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    /* TWO-COLUMN GRID                                                    */
    .contact-container {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 3rem;
      width: 100%;
      max-width: 900px;
      align-items: start;
    }

    .contact-form-section { background: none; border: none; padding: 0; }

    .contact-form-section h3 {
      font-family: "DM Sans", sans-serif;
      font-size: clamp(1.2rem, 1.6vw, 1.6rem);
      font-weight: 300;
      color: rgba(255,255,255,0.72);
      line-height: 1.2;
      letter-spacing: 0.3px;
      margin-bottom: 1.3rem;
    }

    .contact-form { display: flex; flex-direction: column; }

    .form-group { display: flex; flex-direction: column; padding-bottom: 1.4rem; }
    .form-group:last-of-type { padding-bottom: 0; }

    .form-group label {
      font-family: "DM Sans", sans-serif;
      font-size: 0.67rem;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.48);
      margin-bottom: 0.45rem;
      font-weight: 400;
    }

    /* FORM FIELDS
       background: rgba(255,255,255,X) — raise X for more visible fill  */
    .form-group input,
    .form-group textarea {
      background: rgba(255,255,255,0.08); /* <- field fill opacity       */
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: rgba(255,255,255,0.78);
      font-family: "DM Sans", sans-serif;
      font-size: 0.96rem;
      font-weight: 300;
      letter-spacing: 0.2px;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      width: 100%;
    }

    .form-group input:hover, .form-group textarea:hover {
      border-color: rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.11);
    }

    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.13);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    .form-group textarea { resize: vertical; min-height: 120px; line-height: 1.8; }

    /* SEND BUTTON                                                        */
    button[type="submit"] {
      width: 100%;
      cursor: pointer;
      margin-top: 1.4rem;
      padding: 0.72rem 1rem;
      background: rgba(255,255,255,0.14); /* <- button fill opacity      */
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      color: rgba(255,255,255,0.85);
      font-family: "DM Sans", sans-serif;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
      transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.12s;
    }

    button[type="submit"]:hover {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.45);
      color: #fff;
      transform: translateY(-1px);
    }

    .form-status {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      min-height: 1.2em;
    }

    .contact-info { display: flex; flex-direction: column; }

    /* PANEL IMAGE                                                        */
    .contact-image {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
    }

    .contact-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      filter: brightness(0.65);     /* <- 1.0=original 0.7=darker 0.5=dark */
    }

    /* SOCIAL ICONS                                                       */
    .page-social {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      padding: 2rem 0 1rem;
    }

    .social-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: none;
      transition: transform 0.15s, opacity 0.2s;
    }

    .social-icon:hover { transform: translateY(-2px); opacity: 0.85; }
    .social-icon svg { width: 22px; height: 22px; fill: #fff; }

    .social-icon.instagram {
      background: radial-gradient(circle at 30% 110%,
        #fdf497 0%, #fd5949 45%, #d6249f 60%, #285aeb 90%);
    }

    .social-icon.facebook { background: #1877f2; }

    @media (max-width: 760px) {
      .contact-container { grid-template-columns: 1fr; gap: 2rem; }
      .contact-image { display: none; }
      .contact-page { padding: 7rem 1.2rem 2rem; }
    }

  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <h1 class="logo-with-line">
        <a href="../index.html" class="logo-link">
          <span class="text-stack">
            <span class="name-line">dan bauman</span>
            <span class="tagline-line">photography</span>
          </span>
          <span class="vertical-line" aria-hidden="true"></span>
        </a>
      </h1>
      <button class="hamburger-menu" aria-label="Menu" id="hamburger" type="button">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
    <nav class="main-nav" id="mainNav" aria-label="Main navigation">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../gallery.html">Portfolio</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="./" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="contact-page">
    <div class="contact-container" id="contactContainer">

      <section class="contact-form-section">
        <h3>Send a Message</h3>
        <form class="contact-form" id="contactForm" action="https://formspree.io/f/xkoqgzdo" method="POST">

          <div class="form-group" id="nameGroup">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" />
          </div>

          <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <button type="submit" id="sendBtn">Send</button>
          <p id="formStatus" class="form-status" aria-live="polite"></p>

        </form>
      </section>

      <aside class="contact-info" id="contactInfo">
        <div class="contact-image" id="contactImage">
          <img src="2017.jpg" alt="" aria-hidden="true" />
        </div>
      </aside>

    </div>

    <div class="page-social" aria-label="Social links">
      <a class="social-icon instagram" href="https://www.instagram.com/macronovo/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5Zm10.0 1.5a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>
      </a>
      <a class="social-icon facebook" href="https://www.facebook.com/danbaumanphotography" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.2-1.5 1.6-1.5H16.7V5c-.3 0-1.4-.1-2.6-.1-2.6 0-4.3 1.6-4.3 4.5V11H7.2v3h2.6v8h3.7Z"/></svg>
      </a>
    </div>

  </main>

  <script src="../navigation.js"></script>

  <script>
    const contactForm = document.getElementById("contactForm");
    const statusEl    = document.getElementById("formStatus");

    contactForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Sending...";
      try {
        const res = await fetch(contactForm.action, {
          method: "POST",
          body: new FormData(contactForm),
          headers: { Accept: "application/json" }
        });
        if (res.ok) {
          statusEl.textContent = "Thanks! Your message was sent.";
          contactForm.reset();
        } else {
          statusEl.textContent = "Sorry - something went wrong. Please try again.";
        }
      } catch {
        statusEl.textContent = "Network error - please check your connection.";
      }
    });

    function alignImagePanel() {
      if (window.innerWidth <= 760) return;
      const container  = document.getElementById("contactContainer");
      const nameInput  = document.getElementById("name");
      const sendBtn    = document.getElementById("sendBtn");
      const imagePanel = document.getElementById("contactImage");
      const containerTop = container.getBoundingClientRect().top;
      const nameTop      = nameInput.getBoundingClientRect().top;
      const sendBottom   = sendBtn.getBoundingClientRect().bottom;
      imagePanel.style.marginTop = (nameTop - containerTop) + "px";
      imagePanel.style.height    = (sendBottom - nameTop) + "px";
    }

    window.addEventListener("load", alignImagePanel);
    window.addEventListener("resize", alignImagePanel);
  </script>

</body>
</html>
