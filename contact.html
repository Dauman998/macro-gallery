<body>
    <header class="main-header">
        <div class="header-content">
            <h1 class="site-title">
                <span class="name">dan bauman</span>
                <span class="separator">|</span>
                <span class="tagline">photography</span>
            </h1>
            <button class="hamburger-menu" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="index.html">Home</a></li>

            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>

    <main class="contact-page">
        <section class="contact-content">
            <div class="contact-intro">
                <h2>Get in Touch</h2>
                <p>Interested in prints, collaborations, or workshop information? I'd love to hear from you.</p>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <button type="submit" class="submit-button">Send Message</button>
            </form>

            <div class="contact-info">
                <div class="contact-item">
                    <svg class="contact-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 8L10.89 13.26C11.5 13.67 12.5 13.67 13.11 13.26L21 8M5 19H19C20.1046 19 21 18.1046 21 17V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V17C3 18.1046 3.89543 19 5 19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>dan.bauman@photography.example</span>
                </div>

                <div class="contact-item">
                    <svg class="contact-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 5C3 3.89543 3.89543 3 5 3H8.27924C8.70967 3 9.09181 3.27543 9.22792 3.68377L10.7257 8.17721C10.8831 8.64932 10.6694 9.16531 10.2243 9.38787L7.96701 10.5165C9.06925 12.9612 11.0388 14.9308 13.4835 16.033L14.6121 13.7757C14.8347 13.3306 15.3507 13.1169 15.8228 13.2743L20.3162 14.7721C20.7246 14.9082 21 15.2903 21 15.7208V19C21 20.1046 20.1046 21 19 21H18C9.71573 21 3 14.2843 3 6V5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>(555) 123-4567</span>
                </div>

                <div class="contact-item">
                    <svg class="contact-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.657 16.657L13.414 20.9C12.2426 22.0714 10.4162 22.0714 9.24482 20.9L5.00195 16.657C1.65894 13.314 1.65894 7.686 5.00195 4.343C8.34496 1 13.9729 1 17.316 4.343C20.659 7.686 20.659 13.314 17.316 16.657H17.657Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15 11C15 12.6569 13.6569 14 12 14C10.3431 14 9 12.6569 9 11C9 9.34315 10.3431 8 12 8C13.6569 8 15 9.34315 15 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pacific Northwest, USA</span>
                </div>
            </div>
        </section>
    </main>

    <script src="navigation.js"></script>
    <script src="scroll-effects.js"></script>

</html>
