<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Dan Bauman Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      background-color: #0a0a0a;
    }

    /* BACKGROUND IMAGE
       - Change '2017.jpg' to your filename (must be in contact/ folder)
       - Adjust rgba opacity to control overlay darkness
         e.g. rgba(0,0,0,0.75) = darker, rgba(0,0,0,0.45) = lighter
       - Change 'center' to reframe crop e.g. 'top center', '30% 60%'   */
    .contact-page {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.78)),
        url('2017.jpg');                  /* <- background image filename */
      background-size: cover;
      background-position: center;       /* <- reframe background crop   */
      background-attachment: fixed;
      padding: 6rem 1.5rem 4rem;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* TWO-COLUMN GRID */
    .contact-container {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 3rem;
      width: 100%;
      max-width: 1000px;
      align-items: start;
    }

    .contact-form-section {
      background: none;
      border: none;
      padding: 0;
    }

    /* HEADING
       font-size clamp(MIN, PREFERRED, MAX):
         bigger:  clamp(1.4rem, 1.8vw, 1.8rem)
         smaller: clamp(1.0rem, 1.2vw, 1.2rem)                          */
    .contact-form-section h3 {
      font-family: "DM Sans", sans-serif;
      font-size: clamp(1.2rem, 1.6vw, 1.6rem); /* <- adjust size here   */
      font-weight: 300;
      color: rgba(255,255,255,0.72);            /* <- heading brightness */
      line-height: 1.2;
      letter-spacing: 0.3px;
      margin-bottom: 1.3rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      padding-bottom: 1.4rem;
    }

    .form-group:last-of-type { padding-bottom: 0; }

    /* FIELD LABELS                                                       */
    .form-group label {
      font-family: "DM Sans", sans-serif;
      font-size: 0.67rem;            /* <- label size                    */
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.48); /* <- label brightness              */
      margin-bottom: 0.45rem;
      font-weight: 400;
    }

    /* FORM FIELDS                                                        */
    .form-group input,
    .form-group textarea {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.22); /* <- field border       */
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: rgba(255,255,255,0.78);
      font-family: "DM Sans", sans-serif;
      font-size: 0.96rem;
      font-weight: 300;
      letter-spacing: 0.2px;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      width: 100%;
    }

    .form-group input:hover,
    .form-group textarea:hover {
      border-color: rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.08);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.8;
    }

    /* SEND BUTTON                                                        */
    button[type="submit"] {
      width: 100%;
      cursor: pointer;
      margin-top: 1.4rem;
      padding: 0.72rem 1rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.22); /* <- matches fields     */
      border-radius: 8px;
      color: rgba(255,255,255,0.72);
      font-family: "DM Sans", sans-serif;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
      transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.12s;
    }

    button[type="submit"]:hover {
      border-color: rgba(255,255,255,0.45);
      color: rgba(255,255,255,0.92);
      background: rgba(255,255,255,0.05);
      transform: translateY(-1px);
    }

    .form-status {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      min-height: 1.2em;
    }

    /* ICONS ROW
       Centered horizontally. Positioned by JS halfway between the
       bottom of the message textarea and the bottom of the Send button. */
    .form-icons {
      display: flex;
      justify-content: center;
      gap: 0.7rem;
      margin-top: 1.2rem;
    }

    /* RIGHT COLUMN                                                       */
    .contact-info {
      display: flex;
      flex-direction: column;
    }

    /* PANEL IMAGE
       BRIGHTNESS FILTER:
       - filter: brightness(X) darkens without any overlay
       - Sharpness fully preserved — no softening
       - 1.0 = original, 0.7 = slightly darker, 0.5 = quite dark
       - Just change the number, no need to re-export from Lightroom

       PANEL IMAGE FILENAME:
       - Change '2017.jpg' in the img tag below to your filename

       CROP:
       - Change object-position to reframe which part of image shows
         e.g. 'top center', '30% 60%', 'left center'

       BORDER:
       - Same color as field borders rgba(255,255,255,0.22)
       - Set to 'none' to remove entirely                                */
    .contact-image {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.22); /* <- matches fields     */
      border-radius: 8px;
    }

    .contact-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center; /* <- reframe panel crop here      */
      display: block;
      filter: brightness(0.65);       /* <- panel darkness
                                           1.0 = original
                                           0.7 = slightly darker
                                           0.5 = quite dark              */
    }

    /* SOCIAL ICONS
       Rounded corners back (border-radius: 10px)
       Original size (38px)
       To restore brand colors:
         Instagram: background: radial-gradient(circle at 30% 110%,
                      #fdf497 0%, #fd5949 45%, #d6249f 60%, #285aeb 90%);
         Facebook:  background: #1877f2;                                  */
    .social-icon {
      width: 38px;                   /* <- icon size                     */
      height: 38px;
      border-radius: 10px;           /* <- rounded corners back          */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: none;
      background: #3a3a3a;           /* <- grayscale fill                */
      transition: transform 0.15s, background 0.2s;
    }

    .social-icon:hover {
      transform: translateY(-2px);
      background: #4e4e4e;
    }

    .social-icon svg {
      width: 19px;
      height: 19px;
      fill: rgba(255,255,255,0.75);  /* <- glyph brightness              */
    }

    /* MOBILE / TABLET — single column, image hidden                     */
    @media (max-width: 760px) {
      .contact-container {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .contact-image { display: none; }
    }

  </style>
</head>
<body>
  <main class="contact-page">
    <div class="contact-container" id="contactContainer">

      <!-- LEFT COLUMN: form -->
      <section class="contact-form-section">
        <h3>Send a Message</h3>
        <form class="contact-form" id="contactForm" action="https://formspree.io/f/xkoqgzdo" method="POST">

          <div class="form-group" id="nameGroup">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" />
          </div>

          <div class="form-group" id="messageGroup">
            <label for="message">Message *</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <!-- Icons: centered, positioned halfway between message bottom
               and Send button by JS below                               -->
          <div class="form-icons" id="formIcons" aria-label="Social links">
            <a class="social-icon" href="https://www.instagram.com/macronovo/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5Zm10.0 1.5a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>
            </a>
            <a class="social-icon" href="https://www.facebook.com/danbaumanphotography" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.2-1.5 1.6-1.5H16.7V5c-.3 0-1.4-.1-2.6-.1-2.6 0-4.3 1.6-4.3 4.5V11H7.2v3h2.6v8h3.7Z"/></svg>
            </a>
          </div>

          <button type="submit" id="sendBtn">Send</button>
          <p id="formStatus" class="form-status" aria-live="polite"></p>

        </form>
      </section>

      <!-- RIGHT COLUMN: image panel
           Change '2017.jpg' to your panel image filename                -->
      <aside class="contact-info" id="contactInfo">
        <div class="contact-image" id="contactImage">
          <img src="2017.jpg" alt="" aria-hidden="true" /> <!-- <- panel image -->
        </div>
      </aside>

    </div>
  </main>

  <script>
    /* FORM SUBMIT — no need to touch this */
    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("formStatus");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Sending...";
      try {
        const res = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { Accept: "application/json" }
        });
        if (res.ok) { statusEl.textContent = "Thanks! Your message was sent."; form.reset(); }
        else { statusEl.textContent = "Sorry - something went wrong. Please try again."; }
      } catch { statusEl.textContent = "Network error - please check your connection."; }
    });

    /* IMAGE PANEL + ICON ALIGNMENT — no need to touch this
       Image: top aligns with Name field, bottom aligns with Send button bottom.
       Icons: vertically centered in the gap between message textarea
              bottom and Send button top.                                */
    function alignLayout() {
      if (window.innerWidth <= 760) return;

      const container  = document.getElementById("contactContainer");
      const nameInput  = document.getElementById("name");
      const message    = document.getElementById("message");
      const sendBtn    = document.getElementById("sendBtn");
      const imagePanel = document.getElementById("contactImage");
      const icons      = document.getElementById("formIcons");

      const containerTop  = container.getBoundingClientRect().top;
      const nameTop       = nameInput.getBoundingClientRect().top;
      const sendBottom    = sendBtn.getBoundingClientRect().bottom;
      const messageBottom = message.getBoundingClientRect().bottom;
      const sendTop       = sendBtn.getBoundingClientRect().top;

      /* Image panel: Name top to Send button bottom */
      imagePanel.style.marginTop = (nameTop - containerTop) + "px";
      imagePanel.style.height    = (sendBottom - nameTop) + "px";

      /* Icons: midpoint between message bottom and Send button top */
      const gapMid    = (messageBottom + sendTop) / 2;
      const iconsH    = icons.getBoundingClientRect().height;
      const formTop   = form.getBoundingClientRect().top;
      icons.style.marginTop = (gapMid - formTop - iconsH / 2) + "px";
    }

    const form = document.getElementById("contactForm");
    window.addEventListener("load", alignLayout);
    window.addEventListener("resize", alignLayout);
  </script>
</body>
</html>
