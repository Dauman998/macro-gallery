<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Dan Bauman Photography</title>
  <link rel="stylesheet" href="../styles.css?v=20260308-contact-3" />
</head>
<body>
  <header>
    <div class="header-content">
      <h1 class="logo-with-line">
        <a href="../index.html" class="logo-link">
          <span class="text-stack">
            <span class="name-line">dan bauman</span>
            <span class="tagline-line">photography</span>
          </span>
          <span class="vertical-line" aria-hidden="true"></span>
        </a>
      </h1>
      <button class="hamburger-menu" aria-label="Menu" id="hamburger" type="button">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
    <nav class="main-nav" id="mainNav" aria-label="Main navigation">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../gallery.html">Portfolio</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="./" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="contact-page">
    <div class="contact-container">
      <section class="contact-form-section" aria-label="Contact form">
        <h3>Send a Message</h3>
        <form class="contact-form" id="contactForm" action="https://formspree.io/f/xkoqgzdo" method="POST">

          <div class="form-group form-group--full">
            <label for="name">Your Name *</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
          </div>

          <div class="form-group form-group--full">
            <label for="email">Your Email *</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="form-group form-group--half">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" />
          </div>

          <div class="form-group form-group--full">
            <label for="message">Message *</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <button type="submit">Send Message</button>
          <p id="formStatus" class="form-status" aria-live="polite"></p>

          <div class="contact-social" aria-label="Social links">
            <a class="social-icon instagram" href="https://www.instagram.com/macronovo/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
              <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5Zm10.0 1.5a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/>
              </svg>
            </a>
            <a class="social-icon facebook" href="https://www.facebook.com/danbaumanphotography" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
              <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.2-1.5 1.6-1.5H16.7V5c-.3 0-1.4-.1-2.6-.1-2.6 0-4.3 1.6-4.3 4.5V11H7.2v3h2.6v8h3.7Z"/>
              </svg>
            </a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="../navigation.js?v=20260308-final"></script>
  <script>
    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("formStatus");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Sending…";
      try {
        const formData = new FormData(form);
        const response = await fetch(form.action, {
          method: "POST",
          body: formData,
          headers: { Accept: "application/json" }
        });
        if (response.ok) {
          statusEl.textContent = "Thanks! Your message was sent.";
          form.reset();
        } else {
          statusEl.textContent = "Sorry—something went wrong. Please try again.";
        }
      } catch (err) {
        statusEl.textContent = "Network error—please check your connection and try again.";
      }
    });
  </script>
</body>
</html>
