<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Dan Bauman Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
    }

    /* BACKGROUND IMAGE
       Change '2017.jpg' to your filename (must be in contact/ folder)
       Adjust rgba opacity to control overlay darkness                   */
    .contact-page {
      flex: 1;
      background-image:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.78)),
        url('2017.jpg');                  /* <- background image filename */
      background-size: cover;
      background-position: center;       /* <- reframe crop: 'top center', '30% 60%' */
      background-attachment: fixed;
      padding: 6rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* TWO-COLUMN GRID */
    .contact-container {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 3rem;
      width: 100%;
      max-width: 1000px;
      align-items: start;
    }

    .contact-form-section {
      background: none;
      border: none;
      padding: 0;
    }

    /* HEADING */
    .contact-form-section h3 {
      font-family: "DM Sans", sans-serif;
      font-size: clamp(1.2rem, 1.6vw, 1.6rem); /* <- bigger: clamp(1.4rem, 1.8vw, 1.8rem) */
      font-weight: 300;
      color: rgba(255,255,255,0.72);            /* <- heading brightness */
      line-height: 1.2;
      letter-spacing: 0.3px;
      margin-bottom: 1.3rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      padding-bottom: 1.4rem;
    }

    .form-group:last-of-type { padding-bottom: 0; }

    /* FIELD LABELS */
    .form-group label {
      font-family: "DM Sans", sans-serif;
      font-size: 0.67rem;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.48); /* <- label brightness */
      margin-bottom: 0.45rem;
      font-weight: 400;
    }

    /* FORM FIELDS
       background: controls the fill opacity inside each field box
         more visible: rgba(255,255,255,0.12)
         less visible: rgba(255,255,255,0.04)
       border: box outline brightness                                    */
    .form-group input,
    .form-group textarea {
      background: rgba(255,255,255,0.08);       /* <- field fill opacity — adjust here */
      border: 1px solid rgba(255,255,255,0.22); /* <- field border brightness */
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: rgba(255,255,255,0.78);            /* <- typed text brightness */
      font-family: "DM Sans", sans-serif;
      font-size: 0.96rem;
      font-weight: 300;
      letter-spacing: 0.2px;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      width: 100%;
    }

    .form-group input:hover,
    .form-group textarea:hover {
      border-color: rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.11);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.13);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.8;
    }

    /* SEND BUTTON
       background: gives the button a solid feel — adjust color to taste
         more subtle: rgba(255,255,255,0.12)
         more solid:  rgba(255,255,255,0.22)
       border and text stay consistent with the rest of the form         */
    button[type="submit"] {
      width: 100%;
      cursor: pointer;
      margin-top: 1.4rem;
      padding: 0.72rem 1rem;
      background: rgba(255,255,255,0.14);       /* <- button background — adjust here */
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      color: rgba(255,255,255,0.85);
      font-family: "DM Sans", sans-serif;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
      transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.12s;
    }

    button[type="submit"]:hover {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.45);
      color: #fff;
      transform: translateY(-1px);
    }

    .form-status {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      min-height: 1.2em;
    }

    /* RIGHT COLUMN */
    .contact-info {
      display: flex;
      flex-direction: column;
    }

    /* PANEL IMAGE
       BRIGHTNESS: filter: brightness(X) — no overlay, sharpness preserved
         1.0 = original, 0.7 = slightly darker, 0.5 = quite dark
       CROP: change object-position e.g. 'top center', '30% 60%'
       BORDER: matches field borders, set to 'none' to remove           */
    .contact-image {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
    }

    .contact-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center; /* <- reframe panel crop here */
      display: block;
      filter: brightness(0.65);       /* <- 1.0=original 0.7=darker 0.5=dark */
    }

    /* SOCIAL ICONS — fixed to page bottom center
       Visible on all screen sizes including mobile
       gap: space between the two icons                                  */
    .page-social {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      padding: 1.5rem 0 2rem;        /* <- top/bottom padding from edge */
    }

    /* SOCIAL ICONS — brand colors restored
       To switch back to grayscale: background: #3a3a3a on both         */
    .social-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: none;
      transition: transform 0.15s, opacity 0.2s;
    }

    .social-icon:hover {
      transform: translateY(-2px);
      opacity: 0.85;
    }

    .social-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .social-icon.instagram {
      background: radial-gradient(circle at 30% 110%,
        #fdf497 0%, #fd5949 45%, #d6249f 60%, #285aeb 90%);
    }

    .social-icon.facebook {
      background: #1877f2;
    }

    /* MOBILE */
    @media (max-width: 760px) {
      .contact-container {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .contact-image { display: none; }
    }

  </style>
</head>
<body>
  <main class="contact-page">
    <div class="contact-container" id="contactContainer">

      <!-- LEFT COLUMN: form -->
      <section class="contact-form-section">
        <h3>Send a Message</h3>
        <form class="contact-form" id="contactForm" action="https://formspree.io/f/xkoqgzdo" method="POST">

          <div class="form-group" id="nameGroup">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" />
          </div>

          <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <button type="submit" id="sendBtn">Send</button>
          <p id="formStatus" class="form-status" aria-live="polite"></p>

        </form>
      </section>

      <!-- RIGHT COLUMN: image panel -->
      <aside class="contact-info" id="contactInfo">
        <div class="contact-image" id="contactImage">
          <img src="2017.jpg" alt="" aria-hidden="true" /> <!-- <- panel image filename -->
        </div>
      </aside>

    </div>

    <!-- Social icons: centered at page bottom, visible on all screens -->
    <div class="page-social" aria-label="Social links">
      <a class="social-icon instagram" href="https://www.instagram.com/macronovo/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5Zm10.0 1.5a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>
      </a>
      <a class="social-icon facebook" href="https://www.facebook.com/danbaumanphotography" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.2-1.5 1.6-1.5H16.7V5c-.3 0-1.4-.1-2.6-.1-2.6 0-4.3 1.6-4.3 4.5V11H7.2v3h2.6v8h3.7Z"/></svg>
      </a>
    </div>

  </main>

  <script>
    const contactForm = document.getElementById("contactForm");
    const statusEl    = document.getElementById("formStatus");

    contactForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Sending...";
      try {
        const res = await fetch(contactForm.action, {
          method: "POST",
          body: new FormData(contactForm),
          headers: { Accept: "application/json" }
        });
        if (res.ok) {
          statusEl.textContent = "Thanks! Your message was sent.";
          contactForm.reset();
        } else {
          statusEl.textContent = "Sorry - something went wrong. Please try again.";
        }
      } catch {
        statusEl.textContent = "Network error - please check your connection.";
      }
    });

    /* IMAGE PANEL ALIGNMENT
       Top of image aligns with Name field top.
       Bottom of image aligns with Send button bottom.
       Recalculates on resize.                                           */
    function alignImagePanel() {
      if (window.innerWidth <= 760) return;
      const container  = document.getElementById("contactContainer");
      const nameInput  = document.getElementById("name");
      const sendBtn    = document.getElementById("sendBtn");
      const imagePanel = document.getElementById("contactImage");
      const containerTop = container.getBoundingClientRect().top;
      const nameTop      = nameInput.getBoundingClientRect().top;
      const sendBottom   = sendBtn.getBoundingClientRect().bottom;
      imagePanel.style.marginTop = (nameTop - containerTop) + "px";
      imagePanel.style.height    = (sendBottom - nameTop) + "px";
    }

    window.addEventListener("load", alignImagePanel);
    window.addEventListener("resize", alignImagePanel);
  </script>
</body>
</html>
